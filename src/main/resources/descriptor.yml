# Connector Descriptor File
# Specifies the dependencies and repositories required for the connector.

dependencies:
  - groupId: "com.azure"
    artifactId: "azure-messaging-servicebus"
    version: "7.17.7"
  - groupId: "com.azure"
    artifactId: "azure-core"
    version: "1.54.1"
  - groupId: "com.azure"
    artifactId: "azure-core-amqp"
    version: "2.9.12"
  - groupId: "com.azure"
    artifactId: "azure-core-http-netty"
    version: "1.15.7"
  - groupId: "com.azure"
    artifactId: "azure-json"
    version: "1.3.0"
  - groupId: "com.azure"
    artifactId: "azure-xml"
    version: "1.1.0"
  - groupId: "org.reactivestreams"
    artifactId: "reactive-streams"
    version: "1.0.4"
  - groupId: "org.apache.qpid"
    artifactId: "proton-j"
    version: "0.34.1"
  - groupId: "com.microsoft.azure"
    artifactId: "qpid-proton-j-extensions"
    version: "1.2.5"
  - groupId: "io.projectreactor"
    artifactId: "reactor-core"
    version: "3.4.41"
  - groupId: "io.projectreactor.netty"
    artifactId: "reactor-netty-http"
    version: "1.0.48"
  - groupId: "io.projectreactor.netty"
    artifactId: "reactor-netty-core"
    version: "1.0.48"
  - groupId: "org.wso2.integration.inbound"
    artifactId: "mi-inbound-asb"
    version: "${asb.inbound.version}"

repositories:
  - id: "central"
    url: "https://repo1.maven.org/maven2/"
  - id: "wso2-nexus"
    url: "https://maven.wso2.org/nexus/content/groups/wso2-public/"
